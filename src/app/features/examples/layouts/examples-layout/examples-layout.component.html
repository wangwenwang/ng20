<nz-layout class="examples-layout" [class.examples-layout--dark]="isDarkTheme">
  <nz-sider class="examples-layout__sider" [nzWidth]="240" [nzTheme]="isDarkTheme ? 'dark' : 'light'">
    <div class="examples-layout__brand">
      <span class="examples-layout__brand-title">Examples</span>
      <span class="examples-layout__brand-subtitle">ng-zorro playground</span>
    </div>

    <ul nz-menu [nzTheme]="isDarkTheme ? 'dark' : 'light'" nzMode="inline" class="examples-layout__menu">
      @for (item of menuItems; track item.path) {
        <li nz-menu-item [nzSelected]="isActive(item.path)">
          <a [routerLink]="item.path">{{ item.label }}</a>
        </li>
      }
    </ul>
  </nz-sider>

  <nz-layout>
    <div class="examples-layout__header">
      <nz-select
        [(ngModel)]="selectedTheme"
        nzPlaceHolder="请选择主题色"
        (ngModelChange)="onThemeChange($event)"
      >
        @for (theme of themeOptions; track theme.value) {
          <nz-option [nzValue]="theme.value" [nzLabel]="theme.label"></nz-option>
        }
      </nz-select>
    </div>
    <nz-content class="examples-layout__content">
      <div class="al-container">
        <router-outlet />
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
