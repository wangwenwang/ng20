<section class="change-zorro-config-page">
  <header class="change-zorro-config-page__hero">
    <div>
      <p class="change-zorro-config-page__eyebrow">NG-ZORRO Dynamic Theme</p>
      <h1>独立主题切换页面</h1>
      <p class="change-zorro-config-page__desc">
        按官方文档方式调用 `NzConfigService.set(...)`，在运行时动态更新主题主色。
      </p>
    </div>
  </header>

  <div class="change-zorro-config-page__toolbar">
    <label class="change-zorro-config-page__field">
      <span>颜色选择器</span>
      <input
        type="color"
        [ngModel]="primaryColor"
        (ngModelChange)="onChangeConfig($event)"
      />
    </label>

    <label class="change-zorro-config-page__field change-zorro-config-page__field--grow">
      <span>主题主色</span>
      <input
        nz-input
        maxlength="7"
        [ngModel]="primaryColor"
        (ngModelChange)="primaryColor = $event"
        (keyup.enter)="onChangeConfig()"
        (blur)="onChangeConfig()"
        placeholder="#1890ff"
      />
    </label>

    <div class="change-zorro-config-page__actions">
      <button nz-button nzType="primary" (click)="onChangeConfig()">应用主题</button>
      <button nz-button (click)="resetTheme()">恢复默认</button>
    </div>
  </div>

  <div class="change-zorro-config-page__preset-block">
    <span class="change-zorro-config-page__label">预设颜色</span>
    <div class="change-zorro-config-page__preset-list">
      @for (color of presetColors; track color) {
        <button
          type="button"
          class="change-zorro-config-page__preset"
          [class.change-zorro-config-page__preset--active]="color === primaryColor"
          [style.background]="color"
          [attr.aria-label]="'切换到 ' + color"
          (click)="usePreset(color)"
        ></button>
      }
    </div>
  </div>

  <div class="change-zorro-config-page__grid">
    <nz-card nzTitle="主题预览">
      <div class="change-zorro-config-page__preview">
        <div class="change-zorro-config-page__row">
          <button nz-button nzType="primary">主要按钮</button>
          <button nz-button>默认按钮</button>
          <a href="" (click)="$event.preventDefault()">链接操作</a>
        </div>

        <div class="change-zorro-config-page__row">
          <nz-select [(ngModel)]="selectedUser" nzPlaceHolder="请选择一个用户">
            <nz-option nzValue="jack" nzLabel="Jack"></nz-option>
            <nz-option nzValue="lucy" nzLabel="Lucy"></nz-option>
            <nz-option nzValue="tom" nzLabel="Tom"></nz-option>
          </nz-select>
        </div>

        <div class="change-zorro-config-page__token">
          当前主色：<strong>{{ primaryColor }}</strong>
        </div>
      </div>
    </nz-card>

    <nz-card nzTitle="官方文档方式">
      <pre class="change-zorro-config-page__code"><code [textContent]="sampleCode"></code></pre>
      <p class="change-zorro-config-page__hint">
        该能力依赖 `ng-zorro-antd.variable.min.css`，否则运行时更新主题不会生效。
      </p>
    </nz-card>
  </div>
</section>
